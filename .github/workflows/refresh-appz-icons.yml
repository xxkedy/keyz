name: Refresh Appz final icons

on:
  push:
    branches:
      - agent/final-icon-balance
    paths:
      - .github/workflows/refresh-appz-icons.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add icon cache versions
        run: |
          python - <<'PY'
          from pathlib import Path

          index = Path('appz/index.html')
          html = index.read_text()
          replacements = {
              'https://xxkedy.github.io/digz/icon-180.png': 'https://xxkedy.github.io/digz/icon-180.png?v=20260717-2',
              'https://xxkedy.github.io/tagz/icon-180.png': 'https://xxkedy.github.io/tagz/icon-180.png?v=20260717-2',
              'https://xxkedy.github.io/keyz/icon-192.png': 'https://xxkedy.github.io/keyz/icon-192.png?v=20260717-2',
          }
          for old, new in replacements.items():
              html = html.replace(old, new)
          index.write_text(html)

          sw = Path('appz/sw.js')
          sw.write_text(sw.read_text().replace("const CACHE='appz-v1';", "const CACHE='appz-v2';"))
          PY
      - name: Commit Appz cache refresh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add appz/index.html appz/sw.js
          if git diff --cached --quiet; then
            echo "No Appz cache changes"
            exit 0
          fi
          git commit -m "Refresh Appz final icon cache"
          git push
