name: Finalize Appz cache PR

on:
  push:
    branches:
      - agent/final-icon-balance
    paths:
      - .github/workflows/finalize-appz-pr.yml
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/final-icon-balance
          fetch-depth: 0
      - name: Apply final Appz cache changes
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          p = Path('appz/index.html')
          html = p.read_text()
          for url in (
              'https://xxkedy.github.io/digz/icon-180.png',
              'https://xxkedy.github.io/tagz/icon-180.png',
              'https://xxkedy.github.io/keyz/icon-192.png',
          ):
              html = re.sub(re.escape(url) + r'(?:\?v=[^"\s]+)?', url + '?v=20260717-2', html)
          p.write_text(html)

          sw = Path('appz/sw.js')
          text = sw.read_text()
          text = re.sub(r"const CACHE='appz-v\d+';", "const CACHE='appz-v2';", text)
          sw.write_text(text)

          for temp in (
              Path('.github/workflows/refresh-appz-icons.yml'),
              Path('.github/workflows/finalize-appz-pr.yml'),
          ):
              if temp.exists():
                  temp.unlink()
          PY
      - name: Commit branch changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Refresh Appz final icon cache"
            git push origin HEAD:agent/final-icon-balance
          fi
      - name: Create, ready, and merge PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json, os, urllib.request, urllib.error

          token = os.environ['GH_TOKEN']
          repo = 'xxkedy/keyz'
          api = 'https://api.github.com'
          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'Content-Type': 'application/json',
          }

          def call(method, path, data=None):
              req = urllib.request.Request(
                  api + path,
                  data=None if data is None else json.dumps(data).encode(),
                  headers=headers,
                  method=method,
              )
              with urllib.request.urlopen(req) as r:
                  return json.load(r) if r.length != 0 else {}

          pulls = call('GET', f'/repos/{repo}/pulls?state=open&head=xxkedy:agent/final-icon-balance')
          if pulls:
              pr = pulls[0]
          else:
              pr = call('POST', f'/repos/{repo}/pulls', {
                  'title': 'Refresh Appz final icon cache',
                  'head': 'agent/final-icon-balance',
                  'base': 'main',
                  'body': 'Add cache-busting versions to the Digz, Tagz, and Keyz image URLs and bump the Appz service-worker cache to appz-v2.',
                  'draft': False,
              })
          number = pr['number']
          call('PUT', f'/repos/{repo}/pulls/{number}/merge', {
              'merge_method': 'merge',
              'commit_title': 'Refresh Appz final icon cache',
              'commit_message': 'Refresh Appz icon URLs and service-worker cache.',
          })
          print(f'PR #{number} created and merged')
          PY
